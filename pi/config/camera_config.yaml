# CSI camera configuration (Pi side).
camera:
  width: 640
  height: 480
  fps: 30
  format: RGB888          # Picamera2 main-stream pixel format (Picamera2 backend)

  # Software crop: reduce barrel distortion & narrow FOV toward thermal sensor.
  # Set to null to disable. When enabled, the raw frame is cropped to center.
  # This reduces FOV from ~105° (wide) to ~70° (standard), improving fusion
  # registration and thermal-RGB matching.
  crop:
    enabled: true
    left: 64                # crop left edge (pixels from frame left)
    top: 48                 # crop top edge (pixels from frame top)
    width: 512              # output width after crop
    height: 384             # output height after crop (4:3 aspect ratio)

  # Backend selection: auto | picamera2 | v4l2
  #   auto      — use Picamera2 if the libcamera stack imports, else V4L2.
  # This board (Ubuntu 22.04 Server on a Pi 4) has no python3-picamera2 in its
  # apt repos, so `auto` lands on the V4L2 raw-Bayer path below.
  backend: auto

  # V4L2 raw-Bayer backend (used when Picamera2 is unavailable). Values below
  # were verified on this board: OV5647 on unicam (fe801000.csi), sensor pad
  # SGBRG10_1X10. The capture node only streams once its format matches the
  # sensor's raw media-bus format (set via media-ctl), and the raw path has no
  # hardware ISP/3A — so gain/exposure and white balance are handled in software.
  v4l2:
    device: /dev/video0           # unicam capture node
    subdev: /dev/v4l-subdev0      # ov5647 sensor subdevice (exposure/gain ctrls)
    media_device: /dev/media0     # unicam media graph (ov5647 + unicam-image live here; media1 is the ISP)
    sensor_entity: "ov5647 10-0036"
    sensor_format: SGBRG10_1X10   # sensor media-bus format (raw 10-bit Bayer)
    pixelformat: GB10             # matching unpacked 10-bit capture fourcc
    exposure: 300                 # sensor exposure (min 4, max 500)
    gain: 200                     # initial analogue_gain (16-1023)
    auto_gain: true               # software auto-gain toward target brightness
    auto_gain_target: 110         # target mean 8-bit brightness
    gain_min: 16
    gain_max: 1023
    white_balance: true           # gray-world AWB (no hardware AWB on raw path)
