; PlatformIO project for the ESP32 robot-arm controller (Phase 1)
; Build/flash:  pio run -t upload   |   Serial monitor:  pio device monitor -b 115200
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    knolleary/PubSubClient @ ^2.8
    madhephaestus/ESP32Servo @ ^3.0.5
build_flags =
    -DCORE_DEBUG_LEVEL=1
